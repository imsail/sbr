global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'pawstore'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
    # Label every metric with the app name so Grafana filters work
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
