# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL (default profile) ──────────────────────────────────────────────
# Overridable via environment variables (used by Docker Compose).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/petstore}
spring.datasource.username=${DB_USER:petstore}
spring.datasource.password=${DB_PASSWORD:petstore}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' preserves data across restarts; use 'create' to wipe on every start.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Seed data is handled by DataInitializer (idempotent CommandLineRunner).
spring.sql.init.mode=never

# ── Session ───────────────────────────────────────────────────────────────────
server.servlet.session.timeout=1d

# ── Actuator / Prometheus ──────────────────────────────────────────────────────
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always
management.metrics.tags.application=pawstore
